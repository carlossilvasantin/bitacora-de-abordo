<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitacora de abordo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="backdrop"></div>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Cuaderno de navegación</p>
      <h1>Bitacora de abordo</h1>
      <p class="lede">
        Un registro visual y claro de lo que vamos construyendo juntos.
        Muestra las entradas del diario del proyecto y deja preparada la base para seguir creciendo.
      </p>
      <div class="hero-meta">
        <div>
          <span class="meta-label">Fuente</span>
          <strong>diario.md</strong>
        </div>
        <div>
          <span class="meta-label">Regla</span>
          <strong>maximo 3 entradas por dia</strong>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div>
          <p class="eyebrow">Entradas</p>
          <h2>Diario de trabajo</h2>
        </div>
        <span id="entry-count" class="count-pill">0 entradas</span>
      </div>

      <div id="timeline" class="timeline" aria-live="polite"></div>
    </section>
  </main>

  <template id="day-template">
    <article class="day-card">
      <header class="day-head">
        <div>
          <p class="day-label">Jornada</p>
          <h3 class="day-title"></h3>
        </div>
        <span class="day-chip"></span>
      </header>
      <ul class="entry-list"></ul>
    </article>
  </template>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
